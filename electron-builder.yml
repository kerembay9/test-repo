appId: com.surround.app
productName: Surround
directories:
  buildResources: electron/build-resources
  output: dist

# Pack only the Electron glue into the app; the Next.js server ships separately
# as an extraResource (it must stay on disk, not inside the asar, so a child
# Node process can require its bundled modules).
files:
  - dist-electron/**/*
  - package.json
  # main process requires this at runtime (system-audio loopback); the rest of
  # node_modules is excluded by this allowlist, so include it explicitly.
  - node_modules/electron-audio-loopback/**/*
extraResources:
  - from: .next/standalone
    to: standalone
  # Bundled CLI for switching the macOS default output device (BlackHole flow).
  - from: electron/build-resources/bin
    to: bin

asar: true

mac:
  category: public.app-category.music
  # Version-less names so the landing page's
  # releases/latest/download/<file> links stay stable across versions.
  artifactName: ${productName}-mac-${arch}.${ext}
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/build-resources/entitlements.mac.plist
  entitlementsInherit: electron/build-resources/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Surround captures audio on this Mac to stream it, in sync, to the phones
      acting as satellite speakers.

# Notarization runs only when APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
# APPLE_TEAM_ID are present in the environment; otherwise the build is unsigned.
afterSign: electron/build-resources/notarize.js

win:
  artifactName: ${productName}-windows-${arch}.${ext}
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
